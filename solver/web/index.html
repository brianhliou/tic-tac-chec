<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tic Tac Chec Tablebase</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #10130f; color: #eef2e8; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 20% 0%, #283226 0, #151a14 38%, #0d100c 100%); }
    main { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 40px 0 64px; }
    header { display: flex; justify-content: space-between; gap: 24px; align-items: end; margin-bottom: 28px; }
    h1 { margin: 0; font-family: Georgia, serif; font-size: clamp(32px, 5vw, 58px); font-weight: 500; letter-spacing: -0.04em; }
    .eyebrow { color: #a5b69a; text-transform: uppercase; letter-spacing: .16em; font-size: 11px; margin-bottom: 8px; }
    .status { color: #b9c5b1; text-align: right; font-size: 13px; }
    .layout { display: grid; grid-template-columns: minmax(320px, 470px) minmax(320px, 1fr); gap: 36px; align-items: start; }
    .panel { background: rgba(27, 33, 25, .82); border: 1px solid #3b4736; border-radius: 18px; padding: 22px; box-shadow: 0 24px 70px rgba(0,0,0,.25); }
    .summary { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    .value { font-family: Georgia, serif; font-size: 28px; }
    .value.Draw { color: #d5bf78; } .value.Win { color: #8dd6a0; } .value.Loss { color: #e58b78; }
    .meta { color: #aab5a3; font-size: 12px; line-height: 1.5; text-align: right; }
    .board-wrap { display: grid; grid-template-columns: 20px 1fr; grid-template-rows: 1fr 20px; gap: 8px; }
    .ranks, .files { display: grid; color: #84917c; font-size: 11px; text-align: center; }
    .ranks { grid-template-rows: repeat(4, 1fr); align-items: center; }
    .files { grid-template-columns: repeat(4, 1fr); grid-column: 2; align-items: center; }
    .board { grid-column: 2; display: grid; grid-template-columns: repeat(4, 1fr); aspect-ratio: 1; border: 2px solid #66735e; border-radius: 8px; overflow: hidden; }
    .square { position: relative; display: grid; place-items: center; font-family: Georgia, serif; font-size: clamp(34px, 7vw, 64px); }
    .square.light { background: #d5d0b4; color: #20261d; } .square.dark { background: #748268; color: #10140e; }
    .piece.black { color: #151913; text-shadow: 0 1px #a5ad99; } .piece.white { color: #fffdf0; text-shadow: 0 2px 2px #222; }
    .direction { position: absolute; right: 6px; bottom: 3px; font: 700 14px system-ui; opacity: .68; }
    .controls { display: flex; gap: 9px; margin-top: 18px; }
    button { border: 1px solid #53604d; background: #273023; color: #edf1e8; border-radius: 9px; padding: 9px 13px; cursor: pointer; }
    button:hover { background: #34402f; } button:disabled { opacity: .38; cursor: default; }
    .history { margin-top: 13px; min-height: 20px; color: #9eaa97; font-size: 12px; line-height: 1.7; }
    .moves-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
    h2 { margin: 0; font-size: 18px; font-weight: 600; } .count { color: #87917f; font-size: 12px; }
    .moves { display: grid; gap: 8px; max-height: 670px; overflow: auto; padding-right: 4px; }
    .move { width: 100%; padding: 12px 13px; display: grid; grid-template-columns: 70px 1fr auto; gap: 10px; align-items: center; text-align: left; background: #20271d; }
    .move.optimal { border-color: #8fa764; background: #293323; }
    .notation { font: 650 14px ui-monospace, monospace; } .result { font-size: 13px; color: #bdc7b7; }
    .badge { border-radius: 999px; padding: 3px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; background: #46543e; color: #dfe9d8; }
    .badge.throw { background: #593c35; color: #f1c5bc; }
    .loading, .error { padding: 30px; text-align: center; color: #b9c5b1; }
    @media (max-width: 780px) { header { align-items: start; flex-direction: column; } .status { text-align: left; } .layout { grid-template-columns: 1fr; } .moves { max-height: none; } }
  </style>
</head>
<body>
<main>
  <header>
    <div><div class="eyebrow">Perfect-play explorer</div><h1>Tic Tac Chec</h1></div>
    <div class="status">Original Dream Green rules<br>Travel-direction pawn captures</div>
  </header>
  <div class="layout">
    <section class="panel" id="game"><div class="loading">Loading tablebase position…</div></section>
    <section class="panel"><div class="moves-head"><h2>Legal moves</h2><span class="count" id="count"></span></div><div class="moves" id="moves"><div class="loading">Waiting for position…</div></div></section>
  </div>
</main>
<script>
  let path = [];
  const glyphs = { Pawn: '●', Knight: '♞', Bishop: '♝', Rook: '♜' };
  const esc = value => String(value).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  async function load() {
    document.getElementById('moves').innerHTML = '<div class="loading">Probing…</div>';
    try {
      const response = await fetch(`/api/probe?path=${path.join(',')}`);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Probe failed');
      render(data);
    } catch (error) {
      document.getElementById('game').innerHTML = `<div class="error">${esc(error.message)}</div>`;
      document.getElementById('moves').innerHTML = '';
    }
  }

  function render(data) {
    const squares = [];
    for (let rank = 3; rank >= 0; rank--) for (let file = 0; file < 4; file++) {
      const index = rank * 4 + file, piece = data.board[index], dark = (file + rank) % 2 === 0;
      const content = piece ? `<span class="piece ${piece.color.toLowerCase()}">${glyphs[piece.piece]}</span>${piece.direction ? `<span class="direction">${piece.direction === 'up' ? '↑' : '↓'}</span>` : ''}` : '';
      squares.push(`<div class="square ${dark ? 'dark' : 'light'}">${content}</div>`);
    }
    const distance = data.distance == null ? 'No finite distance' : `${data.distance} ${data.distance === 1 ? 'ply' : 'plies'}`;
    document.getElementById('game').innerHTML = `
      <div class="summary"><div><div class="eyebrow">${esc(data.sideToMove)} to move</div><div class="value ${data.value}">${esc(data.value)}</div></div><div class="meta">${distance}<br>${esc(data.position)}</div></div>
      <div class="board-wrap"><div class="ranks"><span>4</span><span>3</span><span>2</span><span>1</span></div><div class="board">${squares.join('')}</div><div class="files"><span>a</span><span>b</span><span>c</span><span>d</span></div></div>
      <div class="controls"><button id="back" ${path.length ? '' : 'disabled'}>← Back</button><button id="reset" ${path.length ? '' : 'disabled'}>Reset</button></div>
      <div class="history">${data.history.length ? data.history.map((move, i) => `${i + 1}. ${esc(move)}`).join(' · ') : 'Empty board'}</div>`;
    document.getElementById('back').onclick = () => { path.pop(); load(); };
    document.getElementById('reset').onclick = () => { path = []; load(); };
    document.getElementById('count').textContent = `${data.moves.length} moves · ${data.moves.filter(m => m.optimal).length} optimal`;
    document.getElementById('moves').innerHTML = data.moves.map(move => {
      const distance = move.distance == null ? 'Draw' : `${move.result} in ${move.distance}`;
      const badge = move.optimal ? '<span class="badge">Optimal</span>' : move.preservesResult ? '<span class="badge">Preserves</span>' : '<span class="badge throw">Throws</span>';
      return `<button class="move ${move.optimal ? 'optimal' : ''}" data-index="${move.index}"><span class="notation">${esc(move.notation)}</span><span class="result">${esc(distance)}</span>${badge}</button>`;
    }).join('') || '<div class="loading">Terminal position</div>';
    document.querySelectorAll('.move').forEach(button => button.onclick = () => { path.push(Number(button.dataset.index)); load(); });
  }
  load();
</script>
</body>
</html>
